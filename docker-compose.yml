services:
  backend:
    build: 
      context: .
      dockerfile: backend/Dockerfile
    container_name: easycryptobuy_backend
    restart: always
    volumes:
      - static_volume:/app/staticfiles
      - media_volume:/app/media
    env_file:
      - .env 
    environment:
      - ENVIRONMENT=production  # Forzar producción en Docker
    depends_on:
      db:
        condition: service_healthy
    networks:
      - web_network
    expose:
      - "8000"

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: easycryptobuy_frontend
    restart: always
    networks:
      - web_network
    expose:
      - "80"

  db:
    image: postgres:15
    container_name: easycryptobuy_db
    restart: always
    volumes:
      - postgres_data:/var/lib/postgresql/data
    env_file:
      - .env  # Comparte el mismo .env
    networks:
      - web_network
    expose:
      - "5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  static_volume:
  media_volume:
  postgres_data:

networks:
  web_network:
    external: true